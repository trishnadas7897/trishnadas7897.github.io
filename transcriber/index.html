<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Redirecting to Hinglish Live Transcription…</title>
  <meta http-equiv="refresh" content="0; url=https://transcriber.cyrussaas.com/" />
  <link rel="canonical" href="https://transcriber.cyrussaas.com/" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #050810;
      color: #c9a96e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .wrap { padding: 2rem; }
    h1 { margin: 0 0 1rem; font-size: 1.5rem; font-weight: 600; letter-spacing: -0.01em; }
    a { color: #d4b275; }
  </style>
  <script>
    // JS redirect for browsers that ignore the meta refresh.
    location.replace('https://transcriber.cyrussaas.com/');
  </script>
</head>
<body>
  <div class="wrap">
    <h1>Opening Hinglish Live Transcription…</h1>
    <p>If you are not redirected automatically, <a href="https://transcriber.cyrussaas.com/">click here</a>.</p>
  </div>
</body>
</html>
