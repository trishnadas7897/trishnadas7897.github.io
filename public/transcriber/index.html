<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#121417" />
  <meta name="robots" content="noindex" />
  <title>Opening Hinglish Live Transcription...</title>
  <meta http-equiv="refresh" content="0; url=https://transcriber.cyrussaas.com/" />
  <link rel="canonical" href="https://transcriber.cyrussaas.com/" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #121417;
      --bg-deep: #0a0c0f;
      --surface: rgba(255, 255, 255, 0.015);
      --border: rgba(255, 255, 255, 0.08);
      --border-mint: rgba(0, 230, 118, 0.35);
      --mint: #00E676;
      --mint-glow: rgba(0, 230, 118, 0.25);
      --fg: #f0ece4;
      --fg-muted: #8a8f9b;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 60% 50% at 15% 0%, rgba(0,230,118,0.14), transparent 70%),
        radial-gradient(ellipse 50% 60% at 85% 100%, rgba(91,161,255,0.08), transparent 70%),
        linear-gradient(180deg, #121417 0%, #0a0c0f 100%);
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(to right, rgba(0,230,118,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,230,118,0.04) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      pointer-events: none;
    }
    .card {
      position: relative;
      overflow: hidden;
      width: 100%;
      max-width: 480px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 2.5rem 2rem;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-mint), transparent);
      opacity: 0.6;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.25rem 0.75rem;
      margin-bottom: 1.25rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.02);
      font-family: "Roboto Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mint);
    }
    .eyebrow-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 0 4px rgba(0,230,118,0.18);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
    h1 {
      margin: 0 0 0.6rem;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.15;
    }
    h1 .accent {
      background: linear-gradient(120deg, #f5f5f5 0%, #80efb4 50%, #00E676 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .lede {
      margin: 0 0 1.5rem;
      color: var(--fg-muted);
      font-size: 0.95rem;
      line-height: 1.55;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 999px;
      background: var(--mint);
      color: var(--bg-deep);
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      box-shadow: 0 10px 36px var(--mint-glow);
      transition: box-shadow 200ms ease, transform 200ms ease;
    }
    .cta:hover { box-shadow: 0 14px 44px rgba(0,230,118,0.4); transform: translateY(-1px); }
    .footnote {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      font-family: "Roboto Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--fg-muted);
    }
    .footnote a { color: var(--fg); text-decoration: none; border-bottom: 1px dotted currentColor; }
    .footnote a:hover { color: var(--mint); }
  </style>

  <script>
    // JS redirect for browsers that ignore the meta refresh.
    try { location.replace('https://transcriber.cyrussaas.com/'); } catch (e) {}
  </script>
</head>

<body>
  <div class="card" role="status" aria-live="polite">
    <span class="eyebrow">
      <span class="eyebrow-dot" aria-hidden="true"></span>
      Hinglish Live Transcription
    </span>
    <h1>
      Opening the <span class="accent">live demo</span>...
    </h1>
    <p class="lede">
      Routing you to <strong>transcriber.cyrussaas.com</strong>. If your browser blocks the redirect, click the button below.
    </p>
    <a class="cta" href="https://transcriber.cyrussaas.com/">
      Open Hinglish Live
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 17L17 7" /><path d="M7 7h10v10" />
      </svg>
    </a>
    <p class="footnote">
      <a href="/">&larr; back to trishnadas7897.github.io</a>
    </p>
  </div>
</body>
</html>
